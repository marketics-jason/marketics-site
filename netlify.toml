# ══════════════════════════════════════════════════════
#  Marketics — Netlify Configuration
# ══════════════════════════════════════════════════════

# Trailing slash normalisation
# Netlify's Pretty URLs adds a 301 /path → /path/ by default.
# This conflicts with canonical tags (which use no trailing slash).
# This rule normalises /path/ → /path so URLs match canonicals.
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = true

# ── PERFORMANCE: LONG-CACHE STATIC ASSETS ─────────────
# Images, fonts, and SVGs are content-addressed or rarely change.
# 1-year immutable cache eliminates 75 KiB of repeat downloads per visit.

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/case-studies/*/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── SECURITY HEADERS ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://services.leadconnectorhq.com https://widgets.leadconnectorhq.com https://cdn.leadconnectorhq.com https://stcdn.leadconnectorhq.com https://buy.stripe.com https://cdn-cgi.cloudflare.com https://www.clarity.ms https://www.google.com https://www.gstatic.com; connect-src 'self' https://services.leadconnectorhq.com https://widgets.leadconnectorhq.com https://stcdn.leadconnectorhq.com https://services.msgsndr.com https://www.clarity.ms; img-src 'self' data: https:; frame-src https://buy.stripe.com https://widgets.leadconnectorhq.com; style-src 'self' 'unsafe-inline' https://cdn.leadconnectorhq.com https://stcdn.leadconnectorhq.com; font-src 'self' https://cdn.leadconnectorhq.com https://stcdn.leadconnectorhq.com;"

# Join/confirmation pages — noindex (payment flow)
[[headers]]
  for = "/join/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Intel report pages — noindex (gated content, form required)
[[headers]]
  for = "/intel/*/report/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
