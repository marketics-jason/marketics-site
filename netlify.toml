# ══════════════════════════════════════════════════════
#  Marketics — Netlify Configuration
# ══════════════════════════════════════════════════════

# Trailing slash normalisation
# Netlify's Pretty URLs adds a 301 /path → /path/ by default.
# This conflicts with canonical tags (which use no trailing slash).
# This rule normalises /path/ → /path so URLs match canonicals.
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = true

# ── SECURITY HEADERS ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://services.leadconnectorhq.com https://widgets.leadconnectorhq.com https://cdn.leadconnectorhq.com https://stcdn.leadconnectorhq.com https://buy.stripe.com https://cdn-cgi.cloudflare.com https://cdn-cookieyes.com https://api.cookieyes.com https://www.google.com https://www.gstatic.com; connect-src 'self' https://services.leadconnectorhq.com https://widgets.leadconnectorhq.com https://stcdn.leadconnectorhq.com https://cdn-cookieyes.com https://api.cookieyes.com https://log.cookieyes.com https://services.msgsndr.com; img-src 'self' data: https:; frame-src https://buy.stripe.com https://widgets.leadconnectorhq.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.leadconnectorhq.com https://stcdn.leadconnectorhq.com; font-src 'self' https://fonts.gstatic.com https://cdn.leadconnectorhq.com https://stcdn.leadconnectorhq.com;"

# Join/confirmation pages — noindex (payment flow)
[[headers]]
  for = "/join/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Intel report pages — noindex (gated content, form required)
[[headers]]
  for = "/intel/*/report/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
