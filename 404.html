<style>
:root{
  --gold:#D6AD60;--night:#0f0f0f;--n2:#141414;--n3:#1a1a1a;
  --stone:#B4B2A9;--dim:#6B6A65;--white:#f8f6f2;
  --d:'Josefin Sans',sans-serif;--s:'DM Sans',sans-serif;--m:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;}
body{
  font-family:var(--s);background:var(--night);color:var(--white);
  min-height:100dvh;overflow-x:hidden;
  display:flex;flex-direction:column;
}

/* GRID BG */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(214,173,96,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(214,173,96,.03) 1px,transparent 1px);
  background-size:80px 80px;
  animation:gp 90s linear infinite;
}
@keyframes gp{to{background-position:80px 80px}}

/* GLOW */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 700px 500px at 50% 60%,rgba(214,173,96,.05) 0%,transparent 65%);
}

nav{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 56px;height:64px;
  background:rgba(10,10,10,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(214,173,96,.1);
  flex-shrink:0;
}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-mark{height:32px;width:auto;flex-shrink:0;}

/* MAIN */
.main{
  position:relative;z-index:1;
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 40px;text-align:center;
}

/* GHOST 404 NUMBER */
.ghost-num{
  font-family:var(--d);font-size:clamp(180px,22vw,280px);font-weight:700;
  letter-spacing:-.04em;color:transparent;line-height:.9;
  -webkit-text-stroke:1px rgba(214,173,96,.12);
  position:relative;user-select:none;margin-bottom:-20px;
}

/* M-MARK */
.m-icon{
  width:clamp(64px,8vw,88px);height:clamp(64px,8vw,88px);
  margin:0 auto 32px;opacity:.9;
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:.9;transform:scale(1);}
  50%{opacity:.7;transform:scale(.97);}
}

.eyebrow{
  font-family:var(--m);font-size:9px;font-weight:400;
  letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:20px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.eyebrow::before,.eyebrow::after{
  content:'';display:block;width:28px;height:1px;background:var(--gold);opacity:.6;
}

h1{
  font-family:var(--d);font-size:clamp(28px,4vw,44px);font-weight:200;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--white);line-height:1.1;margin-bottom:16px;
}
h1 em{color:var(--gold);font-style:normal;}

.sub{
  font-size:15px;color:var(--stone);font-weight:300;
  max-width:420px;line-height:1.75;margin-bottom:48px;
}

/* LINKS */
.links{
  display:flex;flex-wrap:wrap;gap:12px;justify-content:center;
  margin-bottom:56px;
}
.btn-primary{
  font-family:var(--d);font-size:10px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  padding:16px 32px;background:var(--gold);color:var(--night);
  border:none;border-radius:3px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:8px;
  transition:filter .2s,transform .1s;
}
.btn-primary:hover{filter:brightness(1.08);}
.btn-primary:active{transform:scale(.99);}
.btn-secondary{
  font-family:var(--d);font-size:10px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  padding:15px 28px;background:transparent;color:var(--stone);
  border:1px solid rgba(255,255,255,.1);border-radius:3px;
  text-decoration:none;display:inline-flex;align-items:center;gap:8px;
  transition:border-color .2s,color .2s;
}
.btn-secondary:hover{border-color:rgba(255,255,255,.25);color:var(--white);}

/* QUICK LINKS */
.quick-links{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  padding-top:32px;border-top:1px solid rgba(255,255,255,.06);
  max-width:480px;
}
.ql{
  font-family:var(--d);font-size:9px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);text-decoration:none;
  padding:6px 14px;border:1px solid rgba(255,255,255,.07);
  border-radius:20px;transition:color .15s,border-color .15s;
}
.ql:hover{color:var(--gold);border-color:rgba(214,173,96,.25);}

footer{
  position:relative;z-index:1;
  text-align:center;padding:20px 40px 32px;
  border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;
}
footer p{
  font-family:var(--m);font-size:10px;color:var(--dim);line-height:1.8;
}
footer a{color:rgba(214,173,96,.5);text-decoration:none;}
footer a:hover{color:var(--gold);}

@media(max-width:600px){
  nav{padding:0 20px;}
  .ghost-num{font-size:140px;}
  .main{padding:60px 24px;}
  .links{flex-direction:column;align-items:center;}
  .btn-primary,.btn-secondary{width:100%;max-width:300px;justify-content:center;}
}
